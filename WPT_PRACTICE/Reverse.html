/*
<pre>
Q2. jQuery Reverse String:
- Textfield + button
- On click, show reversed string in <p>
</pre>
*/

<!DOCTYPE html>
<html>
<head>
  <title>Reverse String</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <input type="text" id="txt">
  <button id="btn">Reverse</button>
  <p id="result"></p>

  <script>
    $("#btn").click(function() {
      let str = $("#txt").val();
      let rev = str.split("").reverse().join("");
      $("#result").text(rev);
    });
  </script>
</body>
</html>
