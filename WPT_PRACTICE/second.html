<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Hello </h1>
    <input type="number" id="num" placeholder="Enter a Number">
    <button onclick="printTable()"> Print Table </button>
    <div id="output"></div>

    <input id="bt"><button onclick="printList()">Add</button>
    <button onclick="display()"> Display </button>
    <ul id="res"> </ul>

    <input type="color" id="c1"/> 
    <button onclick="changeColor()"> Change Color </button>
        <div id="d">
                <p id="p1"> testing............. </p>
        </div>
    
    <script type="text/javascript"> 
        function printTable() {
            console.log("From Printable function");
            let num = document.getElementById("num").value;
            let result = "";            
            console.log("Table of " + num + " is: ");
            for(let i=1; i<=10; i++) {
                result += num + " X " + i + " = "+ (num *i) + "<br>";
                console.log(num +" * " + i  + " = " + (num*i));
            }
            let str = "";
            for(let i=0; i<4; i++) {
                for(let y=0; y<i; y++) {
                    str += "*"
                }
                console.log(str);
            }
            document.getElementById("output").innerHTML = result;
        }

        let arr=[];
        function printList() {
            arr.push(bt.value);
            alert("added " + bt.value);
            bt.value="";
        }
        function display() {
            res.innerHTML = arr.map(x=> "<li>" + x + "</li>").join("");
        }

        function changeColor() {
            let clr = document.getElementById("c1").value;
            alert(clr);
            document.getElementById("d").style.color = clr;
            document.getElementById("d").style.fontWeight = "bold";
        }
    </script>
</body>
</html>
